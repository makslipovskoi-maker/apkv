name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Recreate Android project
        run: |
          rm -rf android
          flutter create . --platforms=android --project-name sanatorium_trips --org ru.diluch

      - name: Patch Android Gradle Plugin and Java/Kotlin
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import os

          settings_files = [
              Path("android/settings.gradle"),
              Path("android/settings.gradle.kts"),
          ]

          settings = next((p for p in settings_files if p.exists()), None)
          if settings is None:
              print("Android files:")
              for root, dirs, files in os.walk("android"):
                  for f in files:
                      print(os.path.join(root, f))
              raise FileNotFoundError("settings.gradle/settings.gradle.kts not found")

          s = settings.read_text()

          s = re.sub(
              r'id\("com\.android\.application"\)\s+version\s+"[^"]+"',
              'id("com.android.application") version "8.9.1"',
              s
          )
          s = re.sub(
              r"id\s+'com\.android\.application'\s+version\s+'[^']+'",
              "id 'com.android.application' version '8.9.1'",
              s
          )
          s = re.sub(
              r'id\s+"com\.android\.application"\s+version\s+"[^"]+"',
              'id "com.android.application" version "8.9.1"',
              s
          )

          s = re.sub(
              r'id\("org\.jetbrains\.kotlin\.android"\)\s+version\s+"[^"]+"',
              'id("org.jetbrains.kotlin.android") version "2.0.20"',
              s
          )
          s = re.sub(
              r"id\s+'org\.jetbrains\.kotlin\.android'\s+version\s+'[^']+'",
              "id 'org.jetbrains.kotlin.android' version '2.0.20'",
              s
          )
          s = re.sub(
              r'id\s+"org\.jetbrains\.kotlin\.android"\s+version\s+"[^"]+"',
              'id "org.jetbrains.kotlin.android" version "2.0.20"',
              s
          )

          settings.write_text(s)

          app_files = [
              Path("android/app/build.gradle"),
              Path("android/app/build.gradle.kts"),
          ]

          app = next((p for p in app_files if p.exists()), None)
          if app is None:
              raise FileNotFoundError("android/app/build.gradle or build.gradle.kts not found")

          a = app.read_text()

          a = re.sub(r"compileSdk\s*=\s*flutter\.compileSdkVersion", "compileSdk = 36", a)
          a = re.sub(r"targetSdk\s*=\s*flutter\.targetSdkVersion", "targetSdk = 35", a)

          a = a.replace("JavaVersion.VERSION_1_8", "JavaVersion.VERSION_17")
          a = a.replace("JavaVersion.VERSION_11", "JavaVersion.VERSION_17")

          a = re.sub(
              r'jvmTarget\s*=\s*JavaVersion\.VERSION_\d+\.toString\(\)',
              'jvmTarget = "17"',
              a
          )
          a = re.sub(
              r'jvmTarget\s*=\s*"[^"]+"',
              'jvmTarget = "17"',
              a
          )

          if "compileOptions" not in a:
              a = a.replace(
                  "android {",
                  """android {
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          """,
                  1
              )
          elif "kotlinOptions" not in a:
              a = a.replace(
                  "    defaultConfig {",
                  """    kotlinOptions {
                  jvmTarget = "17"
              }

              defaultConfig {""",
                  1
              )

          app.write_text(a)

          wrapper = Path("android/gradle/wrapper/gradle-wrapper.properties")
          if wrapper.exists():
              w = wrapper.read_text()
              w = re.sub(
                  r"distributionUrl=.*",
                  "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.11.1-bin.zip",
                  w
              )
              wrapper.write_text(w)
          PY

      - name: Show Android versions
        run: |
          echo "===== settings ====="
          cat android/settings.gradle 2>/dev/null || cat android/settings.gradle.kts
          echo "===== app build ====="
          cat android/app/build.gradle 2>/dev/null || cat android/app/build.gradle.kts
          echo "===== gradle wrapper ====="
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sanatorium-trips-apk
          path: build/app/outputs/flutter-apk/app-release.apk
