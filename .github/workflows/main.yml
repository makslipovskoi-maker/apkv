name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Restore Android project files
        run: flutter create . --platforms=android --project-name sanatorium_trips --org ru.diluch

      - name: Patch Android Java/Kotlin target
        run: |
          find android -name "*.gradle.kts" -delete

          python3 <<'PY'
          from pathlib import Path
          import re

          p = Path("android/app/build.gradle")
          s = p.read_text()

          s = re.sub(r"compileSdk\s*=\s*flutter\.compileSdkVersion", "compileSdk = 36", s)
          s = re.sub(r"targetSdk\s*=\s*flutter\.targetSdkVersion", "targetSdk = 35", s)

          s = s.replace("JavaVersion.VERSION_1_8", "JavaVersion.VERSION_17")
          s = re.sub(r'jvmTarget\s*=\s*["\']1\.8["\']', 'jvmTarget = "17"', s)
          s = re.sub(r'jvmTarget\s*=\s*JavaVersion\.VERSION_17', 'jvmTarget = "17"', s)

          if "compileOptions" not in s:
              s = s.replace(
                  "    defaultConfig {",
                  """    compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              defaultConfig {""",
                  1
              )

          if "kotlinOptions" not in s:
              s = s.replace(
                  "    defaultConfig {",
                  """    kotlinOptions {
                  jvmTarget = "17"
              }

              defaultConfig {""",
                  1
              )

          p.write_text(s)
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sanatorium-trips-apk
          path: build/app/outputs/flutter-apk/app-release.apk
