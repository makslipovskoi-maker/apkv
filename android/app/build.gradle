plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

def internalKeystoreFile = file("internal-release.keystore")

if (!internalKeystoreFile.exists()) {
    def keytoolExecutable = System.getProperty("java.home") + File.separator + "bin" + File.separator + "keytool"
    exec {
        commandLine keytoolExecutable,
                "-genkeypair",
                "-v",
                "-keystore", internalKeystoreFile.absolutePath,
                "-storepass", "android",
                "-keypass", "android",
                "-alias", "androidreleasekey",
                "-keyalg", "RSA",
                "-keysize", "2048",
                "-validity", "10000",
                "-dname", "CN=Diluch Internal,O=Diluch,C=RU"
    }
}

android {
    namespace = "ru.diluch.sanatorium_trips"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "27.0.12077973"

    defaultConfig {
        applicationId = "ru.diluch.sanatorium_trips"
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            storeFile = internalKeystoreFile
            storePassword = "android"
            keyAlias = "androidreleasekey"
            keyPassword = "android"
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            shrinkResources = false
            minifyEnabled = false
        }
    }
}

flutter {
    source = "../.."
}
